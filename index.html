<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRAYVO Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      padding: 24px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 2px solid #cbd5e1;
    }
    h1 { color: #6366f1; }
    .btn {
      padding: 8px 16px; border-radius: 8px;
      border: none; font-weight: 600; cursor: pointer;
    }
    .btn-primary { background: #6366f1; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-outline { background: white; border: 1px solid #cbd5e1; }
    .card {
      background: white; border-radius: 16px;
      padding: 24px; margin-bottom: 24px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    input, select {
      width: 100%; padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .product-item {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
    }
    .product-item img {
      width: 100%; height: 140px;
      object-fit: cover; border-radius: 8px;
    }
    .product-actions {
      display: flex; gap: 8px; margin-top: 12px;
    }
    .edit-btn, .delete-btn {
      flex:1; text-align: center; padding: 6px;
      border-radius: 6px; cursor: pointer;
    }
    .edit-btn { background: #3b82f6; color: white; }
    .delete-btn { background: #ef4444; color: white; }
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #0f172a; color: white;
      padding: 12px 20px; border-radius: 40px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fas fa-crown"></i> KRAYVO Admin Panel</h1>
    <div>
      <span id="adminEmail" style="margin-right: 16px;"></span>
      <button class="btn btn-outline" onclick="logout()">Logout</button>
      <a href="https://your-customer-store-link.com" id="storeLink" class="btn btn-primary" style="margin-left:8px;">← Back to Store</a>
    </div>
  </div>

  <div class="card">
    <h2 id="formTitle">➕ Add New Product</h2>
    <form id="productForm">
      <div class="form-group">
        <label>Product Name *</label>
        <input type="text" id="prodName" required>
      </div>
      <div class="form-group">
        <label>Brand</label>
        <input type="text" id="prodBrand">
      </div>
      <div class="form-group">
        <label>Price (₹) *</label>
        <input type="number" id="prodPrice" required>
      </div>
      <div class="form-group">
        <label>Original Price (₹)</label>
        <input type="number" id="prodOriginalPrice">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="prodCategory">
          <option>Electronics</option><option>Fashion</option><option>Home</option><option>Beauty</option><option>Books</option>
        </select>
      </div>
      <div class="form-group">
        <label>Image URL (or upload)</label>
        <input type="text" id="prodImageUrl" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>Upload Image</label>
        <input type="file" id="prodImageFile" accept="image/*">
      </div>
      <div class="form-group">
        <label>Affiliate Link (optional)</label>
        <input type="url" id="affiliateLink">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Publish Product</button>
      <button type="button" class="btn btn-outline" id="cancelBtn" style="display:none;" onclick="resetForm()">Cancel</button>
    </form>
  </div>

  <div class="card">
    <h2>📦 Manage Products</h2>
    <div class="product-grid" id="productGrid"></div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAe2LRnVIUWhROFBevXemEJJMUzqLW0Azc",
    authDomain: "krayvo-131a8.firebaseapp.com",
    projectId: "krayvo-131a8",
    storageBucket: "krayvo-131a8.firebasestorage.app",
    messagingSenderId: "278539390638",
    appId: "1:278539390638:web:38cefde7899eb3c883a73f"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  let editingId = null;

  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      // No user, redirect to customer store? But better to show login inside admin?
      // Simple: redirect to customer store (they must set admin role manually)
      window.location.href = "https://your-customer-store-link.com";
      return;
    }
    const userDoc = await db.collection('users').doc(user.uid).get();
    const role = userDoc.exists ? userDoc.data().role : 'customer';
    if (role !== 'admin') {
      alert('Access denied. Admin only.');
      auth.signOut();
      window.location.href = "https://your-customer-store-link.com";
      return;
    }
    document.getElementById('adminEmail').innerText = user.email;
    loadProducts();
  });

  function loadProducts() {
    db.collection('products').orderBy('createdAt','desc').onSnapshot(snap => {
      const products = snap.docs.map(d => ({id:d.id, ...d.data()}));
      renderProducts(products);
    });
  }

  function renderProducts(products) {
    const grid = document.getElementById('productGrid');
    if(products.length===0) { grid.innerHTML='<p>No products. Add one above.</p>'; return; }
    grid.innerHTML = products.map(p => `
      <div class="product-item">
        ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}">` : '<div style="height:140px; background:#e2e8f0; display:flex; align-items:center; justify-content:center;">📦</div>'}
        <h4 style="margin-top:8px;">${p.name}</h4>
        <p>₹${p.price}</p>
        <div class="product-actions">
          <div class="edit-btn" onclick="editProduct('${p.id}')">Edit</div>
          <div class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</div>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('prodName').value.trim();
    const brand = document.getElementById('prodBrand').value.trim();
    const price = parseFloat(document.getElementById('prodPrice').value);
    const originalPrice = parseFloat(document.getElementById('prodOriginalPrice').value) || null;
    const category = document.getElementById('prodCategory').value;
    let imageUrl = document.getElementById('prodImageUrl').value.trim();
    const affiliateLink = document.getElementById('affiliateLink').value.trim();
    const file = document.getElementById('prodImageFile').files[0];

    if (!name || isNaN(price)) return alert('Name and price required');

    if (file) {
      const ref = storage.ref(`products/${Date.now()}_${file.name}`);
      await ref.put(file);
      imageUrl = await ref.getDownloadURL();
    }

    const data = { name, brand, price, originalPrice, category, imageUrl, affiliateLink, updatedAt: new Date() };

    if (editingId) {
      await db.collection('products').doc(editingId).update(data);
      showToast('Product updated');
      resetForm();
    } else {
      data.createdAt = new Date();
      data.sellerId = 'admin';
      await db.collection('products').add(data);
      showToast('Product published');
      resetForm();
    }
    document.getElementById('productForm').reset();
    document.getElementById('prodImageUrl').value = '';
  });

  async function editProduct(id) {
    const doc = await db.collection('products').doc(id).get();
    if (!doc.exists) return;
    const p = doc.data();
    editingId = id;
    document.getElementById('prodName').value = p.name || '';
    document.getElementById('prodBrand').value = p.brand || '';
    document.getElementById('prodPrice').value = p.price || '';
    document.getElementById('prodOriginalPrice').value = p.originalPrice || '';
    document.getElementById('prodCategory').value = p.category || 'Electronics';
    document.getElementById('prodImageUrl').value = p.imageUrl || '';
    document.getElementById('affiliateLink').value = p.affiliateLink || '';
    document.getElementById('formTitle').innerHTML = '✏️ Edit Product';
    document.getElementById('submitBtn').innerText = 'Update Product';
    document.getElementById('cancelBtn').style.display = 'inline-block';
  }

  async function deleteProduct(id) {
    if (confirm('Delete permanently?')) {
      await db.collection('products').doc(id).delete();
      showToast('Deleted');
    }
  }

  function resetForm() {
    editingId = null;
    document.getElementById('productForm').reset();
    document.getElementById('formTitle').innerHTML = '➕ Add New Product';
    document.getElementById('submitBtn').innerText = 'Publish Product';
    document.getElementById('cancelBtn').style.display = 'none';
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 2000);
  }

  async function logout() {
    await auth.signOut();
    window.location.href = "https://your-customer-store-link.com";
  }

  // Update the store link after hosting customer website
  document.getElementById('storeLink').href = "https://your-customer-store-link.com";
</script>
</body>
</html>
