<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRAYVO Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
    .admin-container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #334155; margin-bottom: 32px; }
    .logo-area h1 { font-size: 1.8rem; color: #6366f1; }
    .btn { padding: 8px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-outline { background: transparent; border: 1px solid #475569; color: #cbd5e1; }
    .btn-success { background: #10b981; color: white; }
    .card { background: #1e293b; border-radius: 20px; padding: 24px; margin-bottom: 32px; border: 1px solid #334155; }
    .card h2 { margin-bottom: 20px; }
    .platform-buttons { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    .platform-btn { padding: 10px 20px; border-radius: 40px; background: #0f172a; border: 1px solid #334155; cursor: pointer; }
    .platform-btn.active { background: #6366f1; color: white; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group input, .form-group select { background: #0f172a; border: 1px solid #334155; padding: 10px; border-radius: 10px; color: white; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
    .product-admin-card { background: #0f172a; border-radius: 16px; padding: 12px; border: 1px solid #334155; }
    .product-admin-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; }
    .edit-btn, .delete-btn { display: inline-block; padding: 6px; border-radius: 8px; text-align: center; cursor: pointer; margin-top: 8px; }
    .edit-btn { background: #3b82f6; color: white; margin-right: 8px; }
    .delete-btn { background: #ef4444; color: white; }
    .login-container { max-width: 400px; margin: 100px auto; background: #1e293b; padding: 32px; border-radius: 24px; text-align: center; }
    .login-container input { width: 100%; margin: 12px 0; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; }
    .hidden { display: none; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 20px; border-radius: 12px; z-index: 2000; }
  </style>
</head>
<body>

<div id="loginScreen" class="login-container">
  <h2><i class="fas fa-crown"></i> KRAYVO Admin</h2>
  <p style="margin: 16px 0;">Sign in to manage products</p>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Password">
  <button class="btn btn-primary" style="width:100%;" onclick="adminLogin()">Login</button>
  <button class="btn btn-outline" style="width:100%; margin-top:12px;" onclick="showRegister()">Create Admin Account</button>
  <div id="loginError" style="color:#ef4444; margin-top:12px;"></div>
</div>

<div id="registerScreen" class="login-container hidden">
  <h2>Create Account</h2>
  <input type="email" id="registerEmail" placeholder="Email">
  <input type="password" id="registerPassword" placeholder="Password (min 6 chars)">
  <button class="btn btn-primary" style="width:100%;" onclick="adminRegister()">Register</button>
  <button class="btn btn-outline" style="width:100%; margin-top:12px;" onclick="showLogin()">Back to Login</button>
  <div id="registerError" style="color:#ef4444; margin-top:12px;"></div>
</div>

<div id="adminDashboard" class="hidden">
  <div class="admin-container">
    <div class="admin-header">
      <div class="logo-area"><h1>KRAYVO Admin</h1></div>
      <div><span id="adminEmail"></span> <button class="btn btn-outline" onclick="logout()">Logout</button> <a href="index.html" target="_blank" class="btn btn-outline">View Store</a></div>
    </div>
    <div class="card">
      <h2>Add/Edit Product</h2>
      <div class="platform-buttons" id="platformButtons">
        <button class="platform-btn active" data-platform="krayvo">KRAYVO</button>
        <button class="platform-btn" data-platform="amazon">Amazon</button>
        <button class="platform-btn" data-platform="flipkart">Flipkart</button>
        <button class="platform-btn" data-platform="myntra">Myntra</button>
        <button class="platform-btn" data-platform="savana">Savana</button>
        <button class="platform-btn" data-platform="meesho">Meesho</button>
        <button class="platform-btn" data-platform="ajio">Ajio</button>
      </div>
      <form id="productForm">
        <div class="form-grid">
          <div class="form-group"><label>Product Name *</label><input type="text" id="prodName" required></div>
          <div class="form-group"><label>Brand</label><input type="text" id="prodBrand"></div>
          <div class="form-group"><label>Price (₹) *</label><input type="number" id="prodPrice" required></div>
          <div class="form-group"><label>Original Price</label><input type="number" id="prodOriginalPrice"></div>
          <div class="form-group"><label>Category</label><select id="prodCategory"><option>Mobile</option><option>Fashion</option><option>Beauty</option><option>Electronics</option><option>Home & Kitchen</option><option>Accessories</option><option>Books</option></select></div>
          <div class="form-group"><label>Image URL</label><input type="url" id="imageUrl" placeholder="https://..."></div>
          <div class="form-group"><label>Affiliate Link</label><input type="url" id="affiliateLink"></div>
        </div>
        <button type="submit" class="btn btn-primary">Publish</button>
        <button type="button" id="cancelEdit" class="btn btn-outline" style="display:none;" onclick="resetForm()">Cancel</button>
      </form>
    </div>
    <div class="card">
      <h2>All Products</h2>
      <div id="productList" class="product-grid"></div>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAe2LRnVIUWhROFBevXemEJJMUzqLW0Azc",
    authDomain: "krayvo-131a8.firebaseapp.com",
    projectId: "krayvo-131a8",
    storageBucket: "krayvo-131a8.firebasestorage.app",
    messagingSenderId: "278539390638",
    appId: "1:278539390638:web:38cefde7899eb3c883a73f"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let editingId = null;
  let currentPlatform = "krayvo";
  const allowedAdmins = ['bibekpatra307@gmail.com'];  // Add your email here

  function showToast(msg) {
    const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
    document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
  }

  async function adminLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPassword').value;
    try {
      const user = await auth.signInWithEmailAndPassword(email, pwd);
      if (!allowedAdmins.includes(user.user.email)) { await auth.signOut(); throw new Error('Not authorized'); }
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('adminDashboard').classList.remove('hidden');
      document.getElementById('adminEmail').innerText = user.user.email;
      loadProducts();
    } catch(e) { document.getElementById('loginError').innerText = e.message; }
  }

  async function adminRegister() {
    const email = document.getElementById('registerEmail').value.trim();
    const pwd = document.getElementById('registerPassword').value;
    try {
      const user = await auth.createUserWithEmailAndPassword(email, pwd);
      if (!allowedAdmins.includes(email)) { await auth.signOut(); throw new Error('Account created but not admin. Contact super admin.'); }
      document.getElementById('registerScreen').classList.add('hidden');
      document.getElementById('adminDashboard').classList.remove('hidden');
      document.getElementById('adminEmail').innerText = email;
      loadProducts();
    } catch(e) { document.getElementById('registerError').innerText = e.message; }
  }

  function showLogin() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('registerScreen').classList.add('hidden');
  }
  function showRegister() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('registerScreen').classList.remove('hidden');
  }
  function logout() { auth.signOut(); location.reload(); }

  auth.onAuthStateChanged(async (user) => {
    if (user && allowedAdmins.includes(user.email)) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('adminDashboard').classList.remove('hidden');
      document.getElementById('adminEmail').innerText = user.email;
      loadProducts();
    } else {
      if (user) await auth.signOut();
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('adminDashboard').classList.add('hidden');
    }
  });

  function setPlatform(platform) {
    currentPlatform = platform;
    document.querySelectorAll('.platform-btn').forEach(btn => {
      if (btn.dataset.platform === platform) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  document.querySelectorAll('.platform-btn').forEach(btn => btn.addEventListener('click', () => setPlatform(btn.dataset.platform)));

  async function loadProducts() {
    db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snap => {
      const products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderProductList(products);
    });
  }

  function renderProductList(products) {
    const container = document.getElementById('productList');
    if (!products.length) { container.innerHTML = '<p>No products yet. Add one above.</p>'; return; }
    container.innerHTML = products.map(p => `
      <div class="product-admin-card">
        <img src="${p.imageUrl || 'https://placehold.co/400x400/1e293b/white?text=Product'}" onerror="this.src='https://placehold.co/400x400/1e293b/white?text=Error'">
        <h4>${escapeHtml(p.name)}</h4>
        <p>₹${p.price} ${p.originalPrice ? `<del>₹${p.originalPrice}</del>` : ''}<br><small>${p.platform || 'krayvo'} | ${p.category}</small></p>
        <div>
          <span class="edit-btn" onclick="editProduct('${p.id}')">Edit</span>
          <span class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</span>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])) || ''; }

  document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      name: document.getElementById('prodName').value.trim(),
      brand: document.getElementById('prodBrand').value.trim(),
      price: parseFloat(document.getElementById('prodPrice').value),
      originalPrice: parseFloat(document.getElementById('prodOriginalPrice').value) || null,
      category: document.getElementById('prodCategory').value,
      platform: currentPlatform,
      imageUrl: document.getElementById('imageUrl').value.trim() || null,
      affiliateLink: document.getElementById('affiliateLink').value.trim() || null,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    if (!data.name || isNaN(data.price)) { alert('Name and price required'); return; }
    try {
      if (editingId) {
        await db.collection('products').doc(editingId).update(data);
        showToast('Updated');
      } else {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('products').add(data);
        showToast('Added');
      }
      resetForm();
    } catch(err) { showToast(err.message); }
  });

  async function editProduct(id) {
    const doc = await db.collection('products').doc(id).get();
    if (!doc.exists) return;
    const p = doc.data();
    editingId = id;
    document.getElementById('prodName').value = p.name;
    document.getElementById('prodBrand').value = p.brand || '';
    document.getElementById('prodPrice').value = p.price;
    document.getElementById('prodOriginalPrice').value = p.originalPrice || '';
    document.getElementById('prodCategory').value = p.category || 'Mobile';
    document.getElementById('imageUrl').value = p.imageUrl || '';
    document.getElementById('affiliateLink').value = p.affiliateLink || '';
    setPlatform(p.platform || 'krayvo');
    document.getElementById('cancelEdit').style.display = 'inline-block';
  }

  async function deleteProduct(id) {
    if (confirm('Delete?')) { await db.collection('products').doc(id).delete(); showToast('Deleted'); }
  }

  function resetForm() {
    editingId = null;
    document.getElementById('productForm').reset();
    document.getElementById('cancelEdit').style.display = 'none';
    setPlatform('krayvo');
  }
</script>
</body>
</html>
