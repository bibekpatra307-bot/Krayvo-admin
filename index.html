<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRAYVO Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 0;
      margin: 0;
    }
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }
    /* Header */
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #334155;
      margin-bottom: 32px;
    }
    .logo-area h1 {
      font-size: 1.8rem;
      color: #6366f1;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .admin-actions {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-outline { background: transparent; border: 1px solid #475569; color: #cbd5e1; }
    .btn-outline:hover { background: #1e293b; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    /* Cards */
    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 32px;
      border: 1px solid #334155;
    }
    .card h2 {
      font-size: 1.4rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #f1f5f9;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .form-group input, .form-group select {
      background: #0f172a;
      border: 1px solid #334155;
      padding: 10px 12px;
      border-radius: 10px;
      color: white;
      font-size: 0.9rem;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #6366f1;
    }
    button[type="submit"] {
      margin-top: 20px;
      width: 200px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .product-admin-card {
      background: #0f172a;
      border-radius: 16px;
      padding: 12px;
      border: 1px solid #334155;
      transition: 0.2s;
    }
    .product-admin-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 12px;
      background: #1e293b;
    }
    .product-admin-card h4 {
      margin-top: 8px;
      font-size: 1rem;
    }
    .product-admin-card p {
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .card-actions button {
      flex: 1;
      padding: 6px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    .edit-btn { background: #3b82f6; color: white; }
    .delete-btn { background: #ef4444; color: white; }
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #10b981; color: white;
      padding: 12px 20px; border-radius: 12px;
      z-index: 2000;
    }
    .login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }
    .login-card {
      background: #1e293b;
      padding: 40px;
      border-radius: 32px;
      width: 360px;
      text-align: center;
      border: 1px solid #334155;
    }
    .login-card input {
      width: 100%;
      margin: 12px 0;
      padding: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      color: white;
    }
    .error-text { color: #ef4444; margin-top: 12px; font-size: 0.85rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div id="loginContainer" class="login-overlay">
  <div class="login-card">
    <h2><i class="fas fa-lock"></i> Admin Login</h2>
    <input type="email" id="loginEmail" placeholder="Admin Email" value="bibekpatra307@gmail.com">
    <input type="password" id="loginPassword" placeholder="Password">
    <button class="btn btn-primary" style="width:100%; margin-top:8px;" onclick="adminLogin()">Login</button>
    <div id="loginError" class="error-text"></div>
    <p style="margin-top:16px; font-size:0.75rem; color:#64748b;">Secure admin access only</p>
  </div>
</div>

<div id="adminDashboard" class="hidden">
  <div class="admin-container">
    <div class="admin-header">
      <div class="logo-area">
        <h1><i class="fas fa-crown"></i> KRAYVO Admin</h1>
      </div>
      <div class="admin-actions">
        <span id="adminEmailDisplay" style="color:#94a3b8;"></span>
        <button class="btn btn-outline" onclick="logout()">Logout</button>
        <a href="https://bibekpatra307-bot.github.io/Krayvo/" target="_blank" class="btn btn-outline">← View Store</a>
      </div>
    </div>

    <!-- Add/Edit Product Form -->
    <div class="card">
      <h2><i class="fas fa-plus-circle"></i> <span id="formTitle">Add New Product</span></h2>
      <form id="productForm">
        <div class="form-grid">
          <div class="form-group">
            <label>Product Name *</label>
            <input type="text" id="prodName" required>
          </div>
          <div class="form-group">
            <label>Brand</label>
            <input type="text" id="prodBrand">
          </div>
          <div class="form-group">
            <label>Price (₹) *</label>
            <input type="number" id="prodPrice" required>
          </div>
          <div class="form-group">
            <label>Original Price (₹)</label>
            <input type="number" id="prodOriginalPrice">
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="prodCategory">
              <option>Electronics</option><option>Fashion</option><option>Home</option><option>Beauty</option><option>Books</option>
            </select>
          </div>
          <div class="form-group">
            <label>Platform *</label>
            <select id="prodPlatform">
              <option value="krayvo">KRAYVO (Own Store)</option>
              <option value="amazon">Amazon</option>
              <option value="flipkart">Flipkart</option>
              <option value="myntra">Myntra</option>
              <option value="savana">Savana</option>
              <option value="meesho">Meesho</option>
            </select>
          </div>
          <div class="form-group">
            <label>Product Image (Upload)</label>
            <input type="file" id="prodImageFile" accept="image/*">
            <small style="color:#64748b;">Upload a photo (will be resized to 600px)</small>
          </div>
          <div class="form-group">
            <label>Affiliate Link (Buy URL)</label>
            <input type="url" id="affiliateLink" placeholder="https://...">
          </div>
        </div>
        <div id="formError" class="error-text"></div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Publish Product</button>
        <button type="button" class="btn btn-outline" id="cancelEditBtn" onclick="resetForm()" style="display:none;">Cancel Edit</button>
      </form>
    </div>

    <!-- Products List -->
    <div class="card">
      <h2><i class="fas fa-boxes"></i> All Products (Live)</h2>
      <div id="adminProductGrid" class="product-grid"></div>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAe2LRnVIUWhROFBevXemEJJMUzqLW0Azc",
    authDomain: "krayvo-131a8.firebaseapp.com",
    projectId: "krayvo-131a8",
    storageBucket: "krayvo-131a8.firebasestorage.app",
    messagingSenderId: "278539390638",
    appId: "1:278539390638:web:38cefde7899eb3c883a73f"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let editingProductId = null;

  // Helper: resize image to Base64
  function resizeAndConvertToBase64(file) {
    return new Promise((resolve, reject) => {
      if (!file) return resolve(null);
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const MAX_WIDTH = 600, MAX_HEIGHT = 600;
          let width = img.width, height = img.height;
          if (width > MAX_WIDTH || height > MAX_HEIGHT) {
            if (width > height) {
              height = Math.round(height * MAX_WIDTH / width);
              width = MAX_WIDTH;
            } else {
              width = Math.round(width * MAX_HEIGHT / height);
              height = MAX_HEIGHT;
            }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // Admin login – only allow bibekpatra307@gmail.com
  async function adminLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('loginError');
    errorDiv.innerText = '';
    try {
      const userCred = await auth.signInWithEmailAndPassword(email, password);
      if (userCred.user.email !== 'bibekpatra307@gmail.com') {
        await auth.signOut();
        throw new Error('Unauthorized access. Only specific admin allowed.');
      }
      // Check Firestore role (optional but safe)
      const userDoc = await db.collection('users').doc(userCred.user.uid).get();
      if (!userDoc.exists || userDoc.data().role !== 'admin') {
        await auth.signOut();
        throw new Error('Admin role not assigned.');
      }
      document.getElementById('loginContainer').classList.add('hidden');
      document.getElementById('adminDashboard').classList.remove('hidden');
      document.getElementById('adminEmailDisplay').innerText = userCred.user.email;
      loadProducts();
    } catch (err) {
      errorDiv.innerText = err.message;
      showToast(err.message, 'error');
    }
  }

  function logout() {
    auth.signOut();
    document.getElementById('loginContainer').classList.remove('hidden');
    document.getElementById('adminDashboard').classList.add('hidden');
    resetForm();
  }

  async function loadProducts() {
    db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snap => {
      const products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderProductList(products);
    });
  }

  function renderProductList(products) {
    const grid = document.getElementById('adminProductGrid');
    if (!products.length) { grid.innerHTML = '<p style="color:#94a3b8;">No products yet. Add your first product above.</p>'; return; }
    grid.innerHTML = products.map(p => {
      let imgHtml = '';
      if (p.imageData && p.imageData.startsWith('data:image')) {
        imgHtml = `<img src="${p.imageData}" alt="${p.name}">`;
      } else {
        imgHtml = '<div style="height:160px; background:#1e293b; display:flex; align-items:center; justify-content:center;">📦</div>';
      }
      return `
        <div class="product-admin-card">
          ${imgHtml}
          <h4>${escapeHtml(p.name)}</h4>
          <p>₹${p.price} ${p.originalPrice ? `<del>₹${p.originalPrice}</del>` : ''}<br><small>${p.platform || 'krayvo'} | ${p.category || 'General'}</small></p>
          <div class="card-actions">
            <button class="edit-btn" onclick="editProduct('${p.id}')">Edit</button>
            <button class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorDiv = document.getElementById('formError');
    errorDiv.innerText = '';
    const name = document.getElementById('prodName').value.trim();
    const brand = document.getElementById('prodBrand').value.trim();
    const price = parseFloat(document.getElementById('prodPrice').value);
    const originalPrice = parseFloat(document.getElementById('prodOriginalPrice').value) || null;
    const category = document.getElementById('prodCategory').value;
    const platform = document.getElementById('prodPlatform').value;
    const affiliateLink = document.getElementById('affiliateLink').value.trim();
    const file = document.getElementById('prodImageFile').files[0];
    if (!name || isNaN(price)) { errorDiv.innerText = 'Name and Price are required'; return; }
    try {
      let imageData = null;
      if (file) {
        showToast("Processing image...", "info");
        imageData = await resizeAndConvertToBase64(file);
      }
      const productData = { name, brand, price, originalPrice, category, platform, imageData, affiliateLink, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
      if (editingProductId) {
        await db.collection('products').doc(editingProductId).update(productData);
        showToast('✅ Product updated!', 'success');
        resetForm();
      } else {
        productData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        productData.sellerId = 'admin';
        await db.collection('products').add(productData);
        showToast('✅ Product added!', 'success');
        resetForm();
      }
      document.getElementById('productForm').reset();
      document.getElementById('prodImageFile').value = '';
    } catch (err) { errorDiv.innerText = err.message; showToast(err.message, 'error'); }
  });

  async function editProduct(id) {
    const doc = await db.collection('products').doc(id).get();
    if (!doc.exists) return;
    const p = doc.data();
    editingProductId = id;
    document.getElementById('prodName').value = p.name || '';
    document.getElementById('prodBrand').value = p.brand || '';
    document.getElementById('prodPrice').value = p.price || '';
    document.getElementById('prodOriginalPrice').value = p.originalPrice || '';
    document.getElementById('prodCategory').value = p.category || 'Electronics';
    document.getElementById('prodPlatform').value = p.platform || 'krayvo';
    document.getElementById('affiliateLink').value = p.affiliateLink || '';
    document.getElementById('formTitle').innerHTML = '✏️ Edit Product';
    document.getElementById('submitBtn').innerText = 'Update Product';
    document.getElementById('cancelEditBtn').style.display = 'inline-block';
  }

  async function deleteProduct(id) {
    if (confirm('Delete permanently?')) {
      await db.collection('products').doc(id).delete();
      showToast('Deleted', 'success');
    }
  }

  function resetForm() {
    editingProductId = null;
    document.getElementById('productForm').reset();
    document.getElementById('formTitle').innerHTML = 'Add New Product';
    document.getElementById('submitBtn').innerText = 'Publish Product';
    document.getElementById('cancelEditBtn').style.display = 'none';
    document.getElementById('formError').innerText = '';
  }

  function showToast(msg, type = 'info') {
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerText = msg;
    if (type === 'error') t.style.background = '#ef4444';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // Auto redirect if already logged in as admin
  auth.onAuthStateChanged(async (user) => {
    if (user && user.email === 'bibekpatra307@gmail.com') {
      const doc = await db.collection('users').doc(user.uid).get();
      if (doc.exists && doc.data().role === 'admin') {
        document.getElementById('loginContainer').classList.add('hidden');
        document.getElementById('adminDashboard').classList.remove('hidden');
        document.getElementById('adminEmailDisplay').innerText = user.email;
        loadProducts();
        return;
      }
    }
    if (user) await auth.signOut();
    document.getElementById('loginContainer').classList.remove('hidden');
    document.getElementById('adminDashboard').classList.add('hidden');
  });
</script>
</body>
</html>
