<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRAYVO Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
    .admin-container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #334155; margin-bottom: 32px; }
    .logo-area h1 { font-size: 1.8rem; color: #6366f1; display: flex; align-items: center; gap: 12px; }
    .admin-actions { display: flex; gap: 16px; align-items: center; }
    .btn { padding: 8px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-outline { background: transparent; border: 1px solid #475569; color: #cbd5e1; }
    .btn-outline:hover { background: #1e293b; }
    .btn-success { background: #10b981; color: white; }
    .btn-success:hover { background: #059669; }
    .card { background: #1e293b; border-radius: 20px; padding: 24px; margin-bottom: 32px; border: 1px solid #334155; }
    .card h2 { font-size: 1.4rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: #f1f5f9; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #0f172a; border-radius: 16px; padding: 16px; text-align: center; border: 1px solid #334155; }
    .stat-number { font-size: 2rem; font-weight: 800; color: #6366f1; }
    .platform-buttons { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    .platform-btn { padding: 10px 20px; border-radius: 40px; background: #0f172a; border: 1px solid #334155; color: #cbd5e1; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
    .platform-btn.active { background: #6366f1; color: white; border-color: #6366f1; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-weight: 600; font-size: 0.85rem; color: #94a3b8; }
    .form-group input, .form-group select, .form-group textarea { background: #0f172a; border: 1px solid #334155; padding: 10px 12px; border-radius: 10px; color: white; font-size: 0.9rem; }
    .image-preview { margin-top: 8px; max-width: 100px; max-height: 100px; border-radius: 8px; overflow: hidden; }
    .image-preview img { width: 100%; height: auto; }
    button[type="submit"] { margin-top: 20px; width: 200px; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
    .product-admin-card { background: #0f172a; border-radius: 16px; padding: 12px; border: 1px solid #334155; }
    .product-admin-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; background: #1e293b; }
    .product-admin-card h4 { margin-top: 8px; font-size: 1rem; }
    .product-admin-card p { font-size: 0.8rem; color: #94a3b8; }
    .card-actions { display: flex; gap: 8px; margin-top: 12px; }
    .edit-btn { background: #3b82f6; color: white; flex:1; padding:6px; border-radius:8px; cursor:pointer; text-align:center; }
    .delete-btn { background: #ef4444; color: white; flex:1; padding:6px; border-radius:8px; cursor:pointer; text-align:center; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 20px; border-radius: 12px; z-index: 2000; }
    .error-text { color: #ef4444; margin-top: 8px; font-size: 0.85rem; }
    .login-container { max-width: 400px; margin: 100px auto; background: #1e293b; padding: 32px; border-radius: 24px; text-align: center; }
    .login-container input { width: 100%; margin: 12px 0; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; }
    .hidden { display: none; }
    .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 5000; flex-direction: column; gap: 16px; }
  </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <i class="fas fa-spinner fa-pulse fa-3x" style="color:#6366f1"></i>
  <p>Loading Admin Panel...</p>
</div>

<div id="loginScreen" class="login-container hidden">
  <h2><i class="fas fa-crown"></i> KRAYVO Admin</h2>
  <p style="margin: 16px 0; color: #94a3b8;">Sign in to manage products</p>
  <input type="email" id="loginEmail" placeholder="Email address" autocomplete="email">
  <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
  <button class="btn btn-primary" style="width:100%; margin-top:16px;" onclick="adminLogin()">Login</button>
  <button class="btn btn-outline" style="width:100%; margin-top:12px;" onclick="showRegister()">Create Admin Account</button>
  <div id="loginError" class="error-text" style="margin-top:12px;"></div>
</div>

<div id="registerScreen" class="login-container hidden">
  <h2><i class="fas fa-user-plus"></i> Create Account</h2>
  <input type="email" id="registerEmail" placeholder="Email address">
  <input type="password" id="registerPassword" placeholder="Password (min 6 chars)">
  <button class="btn btn-primary" style="width:100%;" onclick="adminRegister()">Register</button>
  <button class="btn btn-outline" style="width:100%; margin-top:12px;" onclick="showLogin()">Back to Login</button>
  <div id="registerError" class="error-text" style="margin-top:12px;"></div>
</div>

<div id="adminDashboard" class="hidden">
  <div class="admin-container">
    <div class="admin-header">
      <div class="logo-area"><h1><i class="fas fa-crown"></i> KRAYVO Admin</h1></div>
      <div class="admin-actions">
        <span id="adminEmailDisplay" style="color:#94a3b8;"></span>
        <button class="btn btn-outline" onclick="logout()">Logout</button>
        <a href="https://bibekpatra307-bot.github.io/Krayvo/" target="_blank" class="btn btn-outline">← View Store</a>
      </div>
    </div>

    <div class="card">
      <h2><i class="fas fa-chart-line"></i> Platform Statistics</h2>
      <div class="stats-grid" id="statsGrid"><div class="stat-card"><div class="stat-number">0</div><div>Loading...</div></div></div>
    </div>

    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap:wrap; gap:12px; margin-bottom:20px;">
        <h2><i class="fas fa-plus-circle"></i> <span id="formTitle">Add New Product</span></h2>
        <div>
          <button class="btn btn-success" onclick="openImportModal()"><i class="fas fa-link"></i> Import by URL</button>
          <button class="btn btn-outline" onclick="reseedCurrentPlatform()"><i class="fas fa-database"></i> Seed 20 Products</button>
        </div>
      </div>
      <div class="platform-buttons" id="platformButtons">
        <button type="button" class="platform-btn active" data-platform="krayvo"><i class="fas fa-crown"></i> KRAYVO</button>
        <button type="button" class="platform-btn" data-platform="amazon"><i class="fab fa-amazon"></i> Amazon</button>
        <button type="button" class="platform-btn" data-platform="flipkart"><i class="fas fa-store"></i> Flipkart</button>
        <button type="button" class="platform-btn" data-platform="myntra"><i class="fas fa-tshirt"></i> Myntra</button>
        <button type="button" class="platform-btn" data-platform="savana"><i class="fas fa-leaf"></i> Savana</button>
        <button type="button" class="platform-btn" data-platform="meesho"><i class="fas fa-gem"></i> Meesho</button>
        <button type="button" class="platform-btn" data-platform="ajio"><i class="fas fa-shopping-bag"></i> Ajio</button>
      </div>
      <form id="productForm">
        <div class="form-grid">
          <div class="form-group"><label>Product Name *</label><input type="text" id="prodName" required></div>
          <div class="form-group"><label>Brand</label><input type="text" id="prodBrand"></div>
          <div class="form-group"><label>Price (₹) *</label><input type="number" id="prodPrice" required></div>
          <div class="form-group"><label>Original Price (₹)</label><input type="number" id="prodOriginalPrice"></div>
          <div class="form-group"><label>Category</label><select id="prodCategory">
            <option>Mobile</option><option>Fashion</option><option>Beauty</option>
            <option>Electronics</option><option>Home & Kitchen</option>
            <option>Accessories</option><option>Books</option>
          </select></div>
          <div class="form-group"><label>Product Image (Upload)</label><input type="file" id="prodImageFile" accept="image/*"><div id="imagePreview" class="image-preview"></div></div>
          <div class="form-group"><label>Image URL (alternative)</label><input type="url" id="prodImageUrl" placeholder="https://..."></div>
          <div class="form-group"><label>Affiliate Link (for marketplace)</label><input type="url" id="affiliateLink" placeholder="https://..."></div>
        </div>
        <div id="formError" class="error-text"></div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Publish Product</button>
        <button type="button" class="btn btn-outline" id="cancelEditBtn" onclick="resetForm()" style="display:none;">Cancel Edit</button>
      </form>
    </div>

    <div class="card">
      <h2><i class="fas fa-boxes"></i> All Products (Live)</h2>
      <div id="adminProductGrid" class="product-grid"></div>
    </div>
  </div>
</div>

<div id="importModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:4000;">
  <div style="background:#1e293b; border-radius:28px; width:90%; max-width:800px; max-height:85vh; overflow-y:auto; padding:24px;">
    <h3><i class="fas fa-link"></i> Import Product by URL</h3>
    <div class="form-group">
      <label>Product URL (Amazon, Flipkart, Myntra, etc.)</label>
      <input type="url" id="importUrl" placeholder="https://amzn.in/...">
    </div>
    <div style="display: flex; gap: 12px; margin-top: 12px;">
      <button class="btn btn-primary" onclick="fetchProductData()">🔍 Fetch Product</button>
      <button class="btn btn-outline" onclick="closeImportModal()">Cancel</button>
    </div>
    <div id="importPreview" style="margin-top: 20px;"></div>
    <div id="importError" class="error-text"></div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAe2LRnVIUWhROFBevXemEJJMUzqLW0Azc",
    authDomain: "krayvo-131a8.firebaseapp.com",
    projectId: "krayvo-131a8",
    storageBucket: "krayvo-131a8.firebasestorage.app",
    messagingSenderId: "278539390638",
    appId: "1:278539390638:web:38cefde7899eb3c883a73f"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let editingProductId = null;
  let currentPlatform = "krayvo";
  let allProducts = [];
  let currentAdminUser = null;
  const ALLOWED_ADMIN_EMAILS = ['bibekpatra307@gmail.com'];

  async function adminLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('loginError');
    if (!email || !password) { errorDiv.innerText = 'Enter email and password'; return; }
    try {
      const userCred = await auth.signInWithEmailAndPassword(email, password);
      if (!ALLOWED_ADMIN_EMAILS.includes(userCred.user.email)) {
        await auth.signOut();
        errorDiv.innerText = 'Access denied. Not an admin account.';
        return;
      }
      currentAdminUser = userCred.user;
      showDashboard();
    } catch (err) { errorDiv.innerText = err.message; }
  }

  async function adminRegister() {
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    const errorDiv = document.getElementById('registerError');
    if (!email || !password || password.length < 6) { errorDiv.innerText = 'Email and password (min 6 chars) required'; return; }
    try {
      const userCred = await auth.createUserWithEmailAndPassword(email, password);
      if (ALLOWED_ADMIN_EMAILS.includes(email)) {
        currentAdminUser = userCred.user;
        showDashboard();
      } else {
        errorDiv.innerText = 'Account created but not authorized. Contact super admin.';
        await auth.signOut();
      }
    } catch (err) { errorDiv.innerText = err.message; }
  }

  function showLogin() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('registerScreen').classList.add('hidden');
    document.getElementById('adminDashboard').classList.add('hidden');
    document.getElementById('loadingOverlay').classList.add('hidden');
  }

  function showRegister() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('registerScreen').classList.remove('hidden');
  }

  function showDashboard() {
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('registerScreen').classList.add('hidden');
    document.getElementById('adminDashboard').classList.remove('hidden');
    document.getElementById('adminEmailDisplay').innerText = currentAdminUser.email;
    loadProducts();
  }

  function logout() { auth.signOut().then(() => location.reload()); }

  auth.onAuthStateChanged(async (user) => {
    if (user && ALLOWED_ADMIN_EMAILS.includes(user.email)) {
      currentAdminUser = user;
      showDashboard();
    } else {
      if (user) await auth.signOut();
      document.getElementById('loadingOverlay').classList.add('hidden');
      showLogin();
    }
  });

  function resizeAndConvertToBase64(file) {
    return new Promise((resolve) => {
      if (!file) return resolve(null);
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX = 600;
          let width = img.width, height = img.height;
          if (width > height) { height = height * MAX / width; width = MAX; }
          else { width = width * MAX / height; height = MAX; }
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  document.getElementById('prodImageFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => document.getElementById('imagePreview').innerHTML = `<img src="${ev.target.result}" style="max-width:100px; border-radius:8px;">`;
      reader.readAsDataURL(file);
    } else document.getElementById('imagePreview').innerHTML = '';
  });

  async function loadProducts() {
    db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snap => {
      allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderProductList(allProducts);
      loadStatistics();
    }, err => { console.error(err); showToast("Error loading products", "error"); });
  }

  function renderProductList(products) {
    const grid = document.getElementById('adminProductGrid');
    if (!products.length) { grid.innerHTML = '<p>No products yet. Add your first product.</p>'; return; }
    grid.innerHTML = products.map(p => {
      let imgSrc = p.imageData || p.imageUrl || 'https://placehold.co/400x400/1e293b/white?text=Product';
      return `<div class="product-admin-card"><img src="${imgSrc}" onerror="this.src='https://placehold.co/400x400/1e293b/white?text=Error'"><h4>${escapeHtml(p.name)}</h4><p>₹${p.price} ${p.originalPrice ? `<del>₹${p.originalPrice}</del>` : ''}<br><small>${p.platform || 'krayvo'} | ${p.category || 'General'}</small></p><div class="card-actions"><div class="edit-btn" onclick="editProduct('${p.id}')">Edit</div><div class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</div></div></div>`;
    }).join('');
  }

  async function loadStatistics() {
    const stats = {};
    for (const plat of ['krayvo', 'amazon', 'flipkart', 'myntra', 'savana', 'ajio', 'meesho']) {
      let q;
      if (plat === 'krayvo') q = await db.collection('products').where('platform', 'in', [null, 'krayvo']).get();
      else q = await db.collection('products').where('platform', '==', plat).get();
      stats[plat] = q.size;
    }
    const total = Object.values(stats).reduce((a,b)=>a+b,0);
    document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><div class="stat-number">${total}</div><div>Total Products</div></div>` +
      Object.entries(stats).map(([k,v]) => `<div class="stat-card"><div class="stat-number">${v}</div><div>${k.toUpperCase()}</div></div>`).join('');
  }

  function setPlatform(platform) {
    currentPlatform = platform;
    document.querySelectorAll('.platform-btn').forEach(btn => {
      if (btn.dataset.platform === platform) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('prodName').value.trim();
    const price = parseFloat(document.getElementById('prodPrice').value);
    if (!name || isNaN(price)) { document.getElementById('formError').innerText = 'Name and Price required'; return; }
    try {
      let imageData = null;
      const file = document.getElementById('prodImageFile').files[0];
      if (file) imageData = await resizeAndConvertToBase64(file);
      const data = {
        name, brand: document.getElementById('prodBrand').value.trim(),
        price, originalPrice: parseFloat(document.getElementById('prodOriginalPrice').value) || null,
        category: document.getElementById('prodCategory').value,
        platform: currentPlatform,
        imageData, imageUrl: document.getElementById('prodImageUrl').value.trim() || null,
        affiliateLink: document.getElementById('affiliateLink').value.trim() || null,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        sellerId: currentAdminUser?.uid
      };
      if (editingProductId) {
        await db.collection('products').doc(editingProductId).update(data);
        showToast('Product updated');
        resetForm();
      } else {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('products').add(data);
        showToast('Product added');
        resetForm();
      }
      document.getElementById('productForm').reset();
      document.getElementById('imagePreview').innerHTML = '';
    } catch (err) { showToast(err.message, 'error'); }
  });

  async function editProduct(id) {
    const doc = await db.collection('products').doc(id).get();
    if (!doc.exists) return;
    const p = doc.data();
    editingProductId = id;
    document.getElementById('prodName').value = p.name || '';
    document.getElementById('prodBrand').value = p.brand || '';
    document.getElementById('prodPrice').value = p.price || '';
    document.getElementById('prodOriginalPrice').value = p.originalPrice || '';
    document.getElementById('prodCategory').value = p.category || 'Electronics';
    document.getElementById('affiliateLink').value = p.affiliateLink || '';
    document.getElementById('prodImageUrl').value = p.imageUrl || '';
    setPlatform(p.platform || 'krayvo');
    if (p.imageData) document.getElementById('imagePreview').innerHTML = `<img src="${p.imageData}" style="max-width:100px; border-radius:8px;">`;
    document.getElementById('formTitle').innerHTML = '✏️ Edit Product';
    document.getElementById('submitBtn').innerText = 'Update Product';
    document.getElementById('cancelEditBtn').style.display = 'inline-block';
  }

  async function deleteProduct(id) {
    if (confirm('Delete permanently?')) { await db.collection('products').doc(id).delete(); showToast('Deleted'); }
  }

  function resetForm() {
    editingProductId = null;
    document.getElementById('productForm').reset();
    document.getElementById('formTitle').innerHTML = 'Add New Product';
    document.getElementById('submitBtn').innerText = 'Publish Product';
    document.getElementById('cancelEditBtn').style.display = 'none';
    document.getElementById('imagePreview').innerHTML = '';
    setPlatform('krayvo');
  }

  function showToast(msg, type = 'success') {
    const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
    if (type === 'error') t.style.background = '#ef4444';
    document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  async function seedMarketplace(platform) {
    const brandMap = { krayvo: 'KRAYVO', amazon: 'AmazonBasics', flipkart: 'Flipkart SmartBuy', myntra: 'Myntra', ajio: 'Ajio', meesho: 'Meesho', savana: 'Savana' };
    const categoriesList = ["Mobile", "Fashion", "Beauty", "Electronics", "Home & Kitchen", "Accessories", "Books"];
    const products = [];
    for (let i = 1; i <= 20; i++) {
      const cat = categoriesList[i % categoriesList.length];
      const price = Math.floor(Math.random() * 5000) + 299;
      const originalPrice = price + Math.floor(Math.random() * 3000) + 200;
      products.push({
        name: `${brandMap[platform]} ${cat} Item ${i}`,
        brand: brandMap[platform],
        price, originalPrice, category: cat, platform: platform,
        imageUrl: null, imageData: null,
        affiliateLink: platform === 'krayvo' ? '#' : `https://www.${platform}.com`,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        sellerId: 'system'
      });
    }
    const batch = db.batch();
    products.forEach(p => { const ref = db.collection('products').doc(); batch.set(ref, p); });
    await batch.commit();
    showToast(`Seeded 20 products for ${platform}`);
  }

  async function reseedCurrentPlatform() {
    if (confirm(`Add 20 new products to ${currentPlatform.toUpperCase()}?`)) await seedMarketplace(currentPlatform);
  }

  function openImportModal() { document.getElementById('importModal').style.display = 'flex'; }
  function closeImportModal() { document.getElementById('importModal').style.display = 'none'; }

  async function fetchProductData() {
    const url = document.getElementById('importUrl').value.trim();
    if (!url) { document.getElementById('importError').innerText = 'Enter URL'; return; }
    document.getElementById('importPreview').innerHTML = '<div>Fetching...</div>';
    let platform = 'unknown';
    if (url.includes('amazon.')) platform = 'amazon';
    else if (url.includes('flipkart.')) platform = 'flipkart';
    else if (url.includes('myntra.')) platform = 'myntra';
    else if (url.includes('savana.')) platform = 'savana';
    else if (url.includes('meesho.')) platform = 'meesho';
    else if (url.includes('ajio.')) platform = 'ajio';
    const productName = `Imported from ${platform}`;
    window.fetchedProductData = { name: productName, brand: platform, price: 999, originalPrice: 1499, category: 'Electronics', platform, affiliateLink: url };
    document.getElementById('importPreview').innerHTML = `<div style="background:#0f172a; padding:16px; border-radius:16px;"><p><strong>${productName}</strong></p><p>Price: ₹999 <del>₹1499</del></p><button class="btn btn-success" onclick="publishImportedProduct()">Publish</button><button class="btn btn-outline" onclick="fillManualFromImport()">Edit Manually</button></div>`;
  }

  function fillManualFromImport() {
    if (window.fetchedProductData) {
      document.getElementById('prodName').value = window.fetchedProductData.name;
      document.getElementById('prodBrand').value = window.fetchedProductData.brand;
      document.getElementById('prodPrice').value = window.fetchedProductData.price;
      document.getElementById('prodOriginalPrice').value = window.fetchedProductData.originalPrice;
      document.getElementById('prodCategory').value = window.fetchedProductData.category;
      document.getElementById('affiliateLink').value = window.fetchedProductData.affiliateLink;
      setPlatform(window.fetchedProductData.platform);
      closeImportModal();
      showToast('Data filled in form');
    }
  }

  async function publishImportedProduct() {
    if (window.fetchedProductData) {
      await db.collection('products').add({ ...window.fetchedProductData, createdAt: firebase.firestore.FieldValue.serverTimestamp(), sellerId: currentAdminUser?.uid });
      showToast('Product imported');
      closeImportModal();
    }
  }

  document.querySelectorAll('.platform-btn').forEach(btn => btn.addEventListener('click', () => setPlatform(btn.dataset.platform)));
</script>
</body>
</html>
