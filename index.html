<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRAYVO Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
    }
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #334155;
      margin-bottom: 32px;
    }
    .logo-area h1 {
      font-size: 1.8rem;
      color: #6366f1;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .admin-actions {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-outline { background: transparent; border: 1px solid #475569; color: #cbd5e1; }
    .btn-outline:hover { background: #1e293b; }
    .btn-success { background: #10b981; color: white; }
    .btn-success:hover { background: #059669; }
    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 32px;
      border: 1px solid #334155;
    }
    .card h2 {
      font-size: 1.4rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #f1f5f9;
    }
    .platform-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }
    .platform-btn {
      padding: 10px 20px;
      border-radius: 40px;
      background: #0f172a;
      border: 1px solid #334155;
      color: #cbd5e1;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .platform-btn.active {
      background: #6366f1;
      color: white;
      border-color: #6366f1;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .form-group input, .form-group select, .form-group textarea {
      background: #0f172a;
      border: 1px solid #334155;
      padding: 10px 12px;
      border-radius: 10px;
      color: white;
      font-size: 0.9rem;
    }
    button[type="submit"] { margin-top: 20px; width: 200px; }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .product-admin-card {
      background: #0f172a;
      border-radius: 16px;
      padding: 12px;
      border: 1px solid #334155;
    }
    .product-admin-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 12px;
      background: #1e293b;
    }
    .product-admin-card h4 { margin-top: 8px; font-size: 1rem; }
    .product-admin-card p { font-size: 0.8rem; color: #94a3b8; }
    .card-actions { display: flex; gap: 8px; margin-top: 12px; }
    .edit-btn { background: #3b82f6; color: white; flex:1; padding:6px; border-radius:8px; cursor:pointer; text-align:center; }
    .delete-btn { background: #ef4444; color: white; flex:1; padding:6px; border-radius:8px; cursor:pointer; text-align:center; }
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #10b981; color: white;
      padding: 12px 20px; border-radius: 12px;
      z-index: 2000;
    }
    .hidden { display: none; }
    .modal-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 4000; visibility: hidden; opacity: 0; transition: 0.2s;
    }
    .modal-overlay.active { visibility: visible; opacity: 1; }
    .import-modal {
      background: #1e293b;
      border-radius: 28px;
      width: 90%;
      max-width: 800px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 24px;
      border: 1px solid #334155;
    }
    .preview-card {
      background: #0f172a;
      border-radius: 20px;
      padding: 16px;
      margin: 20px 0;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .preview-img { width: 150px; height: 150px; object-fit: cover; border-radius: 16px; background: #1e293b; }
    .preview-details { flex: 1; }
    .platform-badge { display: inline-block; background: #6366f1; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin-right: 8px; }
    .loading-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5000;
      flex-direction: column;
      gap: 16px;
    }
  </style>
</head>
<body>

      <div class="admin-actions">
        <span id="adminEmailDisplay" style="color:#94a3b8;"></span>
        <button class="btn btn-outline" onclick="logout()">Logout</button>
        <a href="https://bibekpatra307-bot.github.io/Krayvo/" target="_blank" class="btn btn-outline">← View Store</a>
      </div>
    </div>

    <!-- Manual Add/Edit Form -->
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap:wrap; gap:12px; margin-bottom:20px;">
        <h2><i class="fas fa-plus-circle"></i> <span id="formTitle">Add New Product</span></h2>
        <button class="btn btn-success" onclick="openImportModal()"><i class="fas fa-link"></i> 🔗 Import Product by Link</button>
      </div>
      <div class="platform-buttons" id="platformButtons">
        <button type="button" class="platform-btn active" data-platform="krayvo"><i class="fas fa-crown"></i> KRAYVO</button>
        <button type="button" class="platform-btn" data-platform="amazon"><i class="fab fa-amazon"></i> Amazon</button>
        <button type="button" class="platform-btn" data-platform="flipkart"><i class="fas fa-store"></i> Flipkart</button>
        <button type="button" class="platform-btn" data-platform="myntra"><i class="fas fa-tshirt"></i> Myntra</button>
        <button type="button" class="platform-btn" data-platform="savana"><i class="fas fa-leaf"></i> Savana</button>
        <button type="button" class="platform-btn" data-platform="meesho"><i class="fas fa-gem"></i> Meesho</button>
        <button type="button" class="platform-btn" data-platform="ajio"><i class="fas fa-shopping-bag"></i> Ajio</button>

          <div class="form-group"><label>Price (₹) *</label><input type="number" id="prodPrice" required></div>
          <div class="form-group"><label>Original Price (₹)</label><input type="number" id="prodOriginalPrice"></div>
          <div class="form-group"><label>Category</label><select id="prodCategory"><option>Electronics</option><option>Fashion</option><option>Home</option><option>Beauty</option><option>Books</option><option>Mobile</option><option>Accessories</option></select></div>
          <div class="form-group"><label>Product Image (Upload)</label><input type="file" id="prodImageFile" accept="image/*"><small>Resized to 600px</small></div>
          <div class="form-group"><label>Affiliate Link</label><input type="url" id="affiliateLink" placeholder="https://..."></div>
        </div>
        <div id="formError" class="error-text"></div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Publish Product</button>
        <button type="button" class="btn btn-outline" id="cancelEditBtn" onclick="resetForm()" style="display:none;">Cancel Edit</button>
      </form>
    </div>

    <!-- Products List -->
    <div class="card">
      <h2><i class="fas fa-boxes"></i> All Products (Live)</h2>
      <div id="adminProductGrid" class="product-grid"></div>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div id="importModal" class="modal-overlay">
  <div class="import-modal">
    <h3><i class="fas fa-link"></i> Import Product by URL</h3>
    <div class="form-group">
      <label>Product URL (Amazon, Flipkart, Myntra, Savana, Meesho, Ajio, Nykaa, Snapdeal)</label>
      <input type="url" id="importUrl" placeholder="https://amzn.in/02JEt1mB or full link">

    <div style="display: flex; gap: 12px; margin-top: 12px;">
      <button class="btn btn-primary" onclick="fetchProductData()">🔍 Fetch Product</button>

    <div id="importError" class="error-text"></div>
  </div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAe2LRnVIUWhROFBevXemEJJMUzqLW0Azc",

  let editingProductId = null;

  let fetchedProductData = null;

  // Helper: resize image to Base64
  function resizeAndConvertToBase64(file) {
    return new Promise((resolve, reject) => {
      if (!file) return resolve(null);
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const MAX_WIDTH = 600, MAX_HEIGHT = 600;
          let width = img.width, height = img.height;
          if (width > MAX_WIDTH || height > MAX_HEIGHT) {
            if (width > height) { height = Math.round(height * MAX_WIDTH / width); width = MAX_WIDTH; }
            else { width = Math.round(width * MAX_HEIGHT / height); height = MAX_HEIGHT; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function logout() {
    auth.signOut().then(() => {
      location.reload();
    });
  }

  async function loadProducts() {
    db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snap => {
      renderProductList(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  }

  function renderProductList(products) {
    const grid = document.getElementById('adminProductGrid');
    if (!products.length) { grid.innerHTML = '<p style="color:#94a3b8;">No products yet. Add your first product above.</p>'; return; }
    grid.innerHTML = products.map(p => {
      let imgHtml = (p.imageData && p.imageData.startsWith('data:image')) ? `<img src="${p.imageData}" alt="${p.name}">` : '<div style="height:160px; background:#1e293b; display:flex; align-items:center; justify-content:center;">📦</div>';
      return `<div class="product-admin-card">${imgHtml}<h4>${escapeHtml(p.name)}</h4><p>₹${p.price} ${p.originalPrice ? `<del>₹${p.originalPrice}</del>` : ''}<br><small>${p.platform || 'krayvo'} | ${p.category || 'General'}</small></p><div class="card-actions"><div class="edit-btn" onclick="editProduct('${p.id}')">Edit</div><div class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</div></div></div>`;
    }).join('');
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  function setPlatform(platform) {
    currentPlatform = platform;
    document.querySelectorAll('.platform-btn').forEach(btn => {
      if (btn.dataset.platform === platform) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorDiv = document.getElementById('formError');
    errorDiv.innerText = '';
    const name = document.getElementById('prodName').value.trim();
    const brand = document.getElementById('prodBrand').value.trim();
    const price = parseFloat(document.getElementById('prodPrice').value);
    const originalPrice = parseFloat(document.getElementById('prodOriginalPrice').value) || null;
    const category = document.getElementById('prodCategory').value;
    const platform = currentPlatform;
    const affiliateLink = document.getElementById('affiliateLink').value.trim();
    const file = document.getElementById('prodImageFile').files[0];
    if (!name || isNaN(price)) { errorDiv.innerText = 'Name and Price are required'; return; }
    try {
      let imageData = null;
      if (file) { showToast("Processing image...", "info"); imageData = await resizeAndConvertToBase64(file); }
      const productData = { name, brand, price, originalPrice, category, platform, imageData, affiliateLink, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
      if (editingProductId) {
        await db.collection('products').doc(editingProductId).update(productData);
        showToast('✅ Product updated!', 'success');
        resetForm();
      } else {
        productData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        productData.sellerId = 'admin';
        await db.collection('products').add(productData);
        showToast('✅ Product added!', 'success');
        resetForm();
      }
      document.getElementById('productForm').reset();
      document.getElementById('prodImageFile').value = '';
    } catch (err) { errorDiv.innerText = err.message; showToast(err.message, 'error'); }
  });

  async function editProduct(id) {
    const doc = await db.collection('products').doc(id).get();
    if (!doc.exists) return;
    const p = doc.data();
    editingProductId = id;
    document.getElementById('prodName').value = p.name || '';
    document.getElementById('prodBrand').value = p.brand || '';
    document.getElementById('prodPrice').value = p.price || '';
    document.getElementById('prodOriginalPrice').value = p.originalPrice || '';
    document.getElementById('prodCategory').value = p.category || 'Electronics';
    document.getElementById('affiliateLink').value = p.affiliateLink || '';
    setPlatform(p.platform || 'krayvo');
    document.getElementById('formTitle').innerHTML = '✏️ Edit Product';
    document.getElementById('submitBtn').innerText = 'Update Product';
    document.getElementById('cancelEditBtn').style.display = 'inline-block';
  }

  async function deleteProduct(id) {
    if (confirm('Delete permanently?')) {
      await db.collection('products').doc(id).delete();
      showToast('Deleted', 'success');
    }
  }

  function resetForm() {
    editingProductId = null;
    document.getElementById('productForm').reset();
    document.getElementById('formTitle').innerHTML = 'Add New Product';
    document.getElementById('submitBtn').innerText = 'Publish Product';
    document.getElementById('cancelEditBtn').style.display = 'none';
    document.getElementById('formError').innerText = '';
    setPlatform('krayvo');
  }

  function showToast(msg, type = 'info') {
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerText = msg;
    if (type === 'error') t.style.background = '#ef4444';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // ========== SMART IMPORT ==========
  async function expandShortUrl(url) {
    try {
      const response = await fetch(url, { method: 'HEAD', redirect: 'follow' });
      return response.url;
    } catch (e) {
      return url;
    }
  }

  async function fetchHtmlWithFallback(url, proxies) {
    for (let proxy of proxies) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);
        const response = await fetch(proxy + encodeURIComponent(url), { signal: controller.signal });
        clearTimeout(timeoutId);
        if (response.ok) {
          const data = await response.json();
          return data.contents || data;
        }
      } catch (e) { console.warn(e); }
    }
    throw new Error('All proxies failed');
  }

  async function fetchProductData() {
    let url = document.getElementById('importUrl').value.trim();
    if (!url) { document.getElementById('importError').innerText = 'Please enter a product URL'; return; }
    document.getElementById('importError').innerText = '';
    document.getElementById('importPreview').innerHTML = '<div style="text-align:center; padding:20px;"><i class="fas fa-spinner fa-pulse"></i> Fetching product details...</div>';
    
    try {
      let finalUrl = url;
      if (url.includes('amzn.in') || url.includes('fkrt.it') || url.includes('amzn.to') || url.includes('flip.it')) {
        finalUrl = await expandShortUrl(url);
      }
      
      let platform = 'unknown';
      if (finalUrl.includes('amazon.')) platform = 'amazon';
      else if (finalUrl.includes('flipkart.')) platform = 'flipkart';
      else if (finalUrl.includes('myntra.')) platform = 'myntra';
      else if (finalUrl.includes('savana.')) platform = 'savana';
      else if (finalUrl.includes('meesho.')) platform = 'meesho';
      else if (finalUrl.includes('ajio.')) platform = 'ajio';
      else if (finalUrl.includes('nykaa.')) platform = 'nykaa';
      else if (finalUrl.includes('snapdeal.')) platform = 'snapdeal';
      
      const proxies = ['https://api.allorigins.win/get?url=', 'https://corsproxy.io/?url=', 'https://thingproxy.freeboard.io/fetch/'];
      const html = await fetchHtmlWithFallback(finalUrl, proxies);
      
      let productInfo = { name: '', brand: '', price: 0, originalPrice: 0, image: '', description: '', rating: 0, reviews: 0, category: '' };
      const jsonLdMatches = html.match(/<script type="application\/ld\+json">([\s\S]*?)<\/script>/gi);
      if (jsonLdMatches) {
        for (let match of jsonLdMatches) {
          try {
            let jsonStr = match.replace(/<script type="application\/ld\+json">|<\/script>/g, '');
            jsonStr = jsonStr.replace(/^\uFEFF/, '');
            const json = JSON.parse(jsonStr);
            if (json['@type'] === 'Product' || json['@type'] === 'product') {
              productInfo.name = json.name || productInfo.name;
              productInfo.brand = json.brand?.name || json.brand || productInfo.brand;
              productInfo.description = json.description || productInfo.description;
              productInfo.image = json.image || productInfo.image;
              if (json.offers) {
                let offer = json.offers;
                if (Array.isArray(offer)) offer = offer[0];
                productInfo.price = parseFloat(offer.price) || 0;
                if (offer.priceSpecification?.price) productInfo.originalPrice = parseFloat(offer.priceSpecification.price);
              }
              if (json.aggregateRating) {
                productInfo.rating = parseFloat(json.aggregateRating.ratingValue) || 0;
                productInfo.reviews = parseInt(json.aggregateRating.reviewCount) || 0;
              }
              break;
            }
          } catch(e) {}
        }
      }
      
      if (!productInfo.name) {
        const titleMatch = html.match(/<meta property="og:title" content="([^"]+)"/i);
        productInfo.name = titleMatch ? titleMatch[1] : '';
        const imgMatch = html.match(/<meta property="og:image" content="([^"]+)"/i);
        productInfo.image = imgMatch ? imgMatch[1] : '';
        const descMatch = html.match(/<meta property="og:description" content="([^"]+)"/i);
        productInfo.description = descMatch ? descMatch[1] : '';
      }
      
      if (!productInfo.price) {
        const priceRegex = /[₹₹]\\s*(\\d{1,3}(?:,\\d{3})*(?:\\.\\d{2})?)/;
        const priceMatch = html.match(priceRegex);
        if (priceMatch) productInfo.price = parseFloat(priceMatch[1].replace(/,/g, ''));
      }
      
      let productName = productInfo.name;
      if (productName.includes('|')) productName = productName.split('|')[0].trim();
      if (productName.length > 100) productName = productName.substring(0, 100);
      let brand = productInfo.brand || productName.split(' ')[0];
      let originalPrice = productInfo.originalPrice;
      if (!originalPrice && productInfo.price) originalPrice = Math.round(productInfo.price * 1.5);
      let discountPercent = 0;
      if (originalPrice && productInfo.price) discountPercent = Math.round((1 - productInfo.price/originalPrice) * 100);
      
      let category = 'General';
      const catMatch = html.match(/<meta property="product:category" content="([^"]+)"/i);
      if (catMatch) category = catMatch[1];
      
      const existing = await db.collection('products').where('affiliateLink', '==', finalUrl).get();
      if (!existing.empty) {
        document.getElementById('importError').innerHTML = '⚠️ Product already exists in database!';
        document.getElementById('importPreview').innerHTML = '';
        return;
      }
      
      fetchedProductData = {
        name: productName || 'Product Name',
        brand: brand || platform,
        price: Math.round(productInfo.price) || 999,
        originalPrice: originalPrice ? Math.round(originalPrice) : null,
        category: category,
        platform: platform,
        imageUrl: productInfo.image,
        affiliateLink: finalUrl,
        description: productInfo.description?.substring(0, 500) || '',
        rating: productInfo.rating || 0,
        reviews: productInfo.reviews || 0,
        discountPercent: discountPercent
      };
      
      const previewHtml = `
        <div class="preview-card">
          <img class="preview-img" src="${fetchedProductData.imageUrl || 'https://placehold.co/150x150/1e293b/white?text=No+Image'}" onerror="this.src='https://placehold.co/150x150/1e293b/white?text=No+Image'">
          <div class="preview-details">
            <p><strong>${escapeHtml(fetchedProductData.name)}</strong></p>
            <p><span class="platform-badge">${platform.toUpperCase()}</span> Brand: ${escapeHtml(fetchedProductData.brand)}</p>
            <p>💰 Price: ₹${fetchedProductData.price} ${fetchedProductData.originalPrice ? `<del>₹${fetchedProductData.originalPrice}</del>` : ''} ${fetchedProductData.discountPercent > 0 ? `<span style="color:#10b981;">(${fetchedProductData.discountPercent}% OFF)</span>` : ''}</p>
            <p>⭐ Rating: ${fetchedProductData.rating} (${fetchedProductData.reviews} reviews)</p>
            <p>📂 Category: ${fetchedProductData.category}</p>
            <button class="btn btn-success" onclick="publishImportedProduct()">✅ Publish Product</button>
            <button class="btn btn-outline" onclick="showManualEntry()">✏️ Edit Manually</button>
          </div>
        </div>
      `;
      document.getElementById('importPreview').innerHTML = previewHtml;
    } catch (err) {
      document.getElementById('importError').innerHTML = `Failed to fetch. Error: ${err.message}`;
      document.getElementById('importPreview').innerHTML = `
        <div style="margin-top:16px; padding:16px; background:#0f172a; border-radius:16px;">
          <button class="btn btn-primary" onclick="showManualEntryFromError()">➕ Manual Entry with URL</button>
        </div>
      `;
    }
  }
  
  function showManualEntry() {
    if (!fetchedProductData) return;
    document.getElementById('prodName').value = fetchedProductData.name;
    document.getElementById('prodBrand').value = fetchedProductData.brand;
    document.getElementById('prodPrice').value = fetchedProductData.price;
    document.getElementById('prodOriginalPrice').value = fetchedProductData.originalPrice || '';
    document.getElementById('prodCategory').value = fetchedProductData.category;
    document.getElementById('affiliateLink').value = fetchedProductData.affiliateLink;
    setPlatform(fetchedProductData.platform);
    closeImportModal();
    showToast('Product data filled in manual form.', 'info');
  }
  
  function showManualEntryFromError() {
    const url = document.getElementById('importUrl').value.trim();
    if (url) {
      document.getElementById('affiliateLink').value = url;
      setPlatform('amazon');
      showToast('URL pasted into affiliate link field. Fill other details manually.', 'info');
    }
    closeImportModal();
  }
  
  async function publishImportedProduct() {
    if (!fetchedProductData) return;
    try {
      const finalData = { ...fetchedProductData, imageData: null, createdAt: firebase.firestore.FieldValue.serverTimestamp(), updatedAt: firebase.firestore.FieldValue.serverTimestamp(), sellerId: 'admin' };
      await db.collection('products').add(finalData);
      showToast('✅ Product imported and published!', 'success');
      closeImportModal();
      loadProducts();
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
    }
  }
  
  function openImportModal() {
    document.getElementById('importModal').classList.add('active');
    document.getElementById('importUrl').value = '';
    document.getElementById('importPreview').innerHTML = '';
    document.getElementById('importError').innerText = '';
    fetchedProductData = null;
  }
  function closeImportModal() { document.getElementById('importModal').classList.remove('active'); }
  
  document.querySelectorAll('.platform-btn').forEach(btn => {
    btn.addEventListener('click', () => setPlatform(btn.dataset.platform));
  });
  
  // Start auto-login
  autoLogin();
</script>
</body>
</html>
